services:
  proj-mgt-dashboard:
    build: .
    ports:
      - "${PORT:-5020}:${PORT:-5020}"
    volumes:
      # SQLite file and snapshots live here — persists across restarts and rebuilds
      - ./data:/app/data
    restart: unless-stopped
    env_file:
      # Copy .env.example to .env and set DASHBOARD_PASS before running
      - path: .env
        required: false   # allows running without .env (auth disabled)
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5020}
      - BASE_PATH=${BASE_PATH:-/project-management-dashboard}
